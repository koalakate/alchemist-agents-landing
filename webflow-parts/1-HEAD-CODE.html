<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>

  /* === ALCHEMIST CUSTOM STYLES === */

  /* NAV */

    font-size: 1.3rem;

    color: var(--text-primary);
  }
  .alch-nav a {

    border: 1px solid var(--border);

    overflow: hidden;

    flex-direction: column;

  .alch-code-header {

  .alch-arrow-col {

    align-items: center;

  .alch-arrow-icon {

  .alch-typing-cursor {
    display: inline-block;
    width: 2px;
    height: 1em;

  .alch-arch-label {

  .alch-arch-connector {

  .alch-icon-circle {

    height: 64px;

    align-items: center;
    justify-content: center;
    background: var(--bg-card);
    font-size: 1.5rem;
  }

  /* DEPLOYMENT */

    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;

  .alch-deploy-card {
    background: var(--bg-card);

    font-size: 0.8rem;
    color: var(--green);

  /* CTA */
  .alch-cta-section {
    padding: 8rem 2rem;

    position: relative;
  }
  .alch-cta-section::before {
    content: "";

  .alch-btn-cta {

  /* FOOTER */
  .alch-footer {

  /* MODAL */
  .alch-modal-overlay {

  /* ========== RESPONSIVE ========== */
